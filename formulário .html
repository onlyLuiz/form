<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="formulário .css" media="">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
     </style>
    <title>formulário</title>
</head>
<body>
    <div>
        <h1 id="titulo">Cadastro de DEVs</h1>
        <p id="subtitulo"> <strong>suas informações</strong></p>
        <br>
        <form>
            <fieldset class="grupo">
                <div>
                    <label for="Nome"><strong>Nome</strong></label>
                    <input type="text" name="nome" id="nome" required>
                </div>
                <div>
                    <label for="Sobrenome"><strong>Sobrenome</strong></label>
                    <input type="text" name="sobrenome" id="sobrenome" required>
                </div>
            </fieldset>
            <div class="campo">
                <label for="Email"><strong>Email</strong></label>
                <input type="email" name="email" id="email" required>
            </div>

            <div class="campo">
                <label><strong>qual lado da aplicação você desenvolve?</strong></label>
                <label>
                    <input type="radio" name="devweb" value="front-end" checked> Front-end
                </label>
                <label >
                    <input type="radio" name="devweb" value="back-end">Back-end
                </label>

                <label>
                    <input type="radio" name="devweb" value="full-stack">Full-stack
                </label>
            </div>
            <div class="campo">
                <label for="Senioridade"> <strong>Senioridade</strong></label>
                <select id="Senioridade">
                    <option selected disabled value="">Selecione</option>
                    <option>Junior</option>
                    <option >Pleno</option>
                    <option>Senior</option>
                </select>
            </div>
            <fieldset class="grupo">
                <div class="campo">
                    <label><strong>As tecnologia que utiliza </strong></label>
                    <input type="checkbox" id="tecnologia1" name="tecnologia1" value="HTML">
                    <label for="tecnolia1">HTML</label>
                    <input type="checkbox" id="tecnologia2" name="tecnologia2" value="HTML">
                    <label for="tecnolia2">CSS</label>
                    <input type="checkbox" id="tecnologia3" name="tecnologia3" value="HTML">
                    <label for="tecnolia3">Java Script</label>
                    <input type="checkbox" id="tecnologia4" name="tecnologia4" value="HTML">
                    <label for="tecnolia4">PHP</label>
                    <input type="checkbox" id="tecnologia5" name="tecnologia5" value="HTML">
                    <label for="tecnolia5">C#</label>
                    <input type="checkbox" id="tecnologia6" name="tecnologia6" value="HTML">
                    <label for="tecnolia6">Python</label>
                    <input type="checkbox" id="tecnologia7" name="tecnologia7" value="HTML">
                    <label for="tecnolia7">java<label>
                    
                </div>
            </fieldset>
            <div class="campo">
                <br>
                <label><strong>um pouco da sua experiência:</strong></label>
                <textarea row="6" style=" width:25em" id="experiencia" name="experiencia"></textarea>
            </div>
            <button type="submit" class="botao">concluido</button>
        </form>
    </div>
</body>
</html>
